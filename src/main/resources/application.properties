spring.application.name=crm-small

# Database
spring.datasource.url=jdbc:postgresql://localhost:5433/crm_small
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# LTV configuration
crm.ltv.projection-months=24
crm.ltv.project-revenue-discount-factor=0.7
crm.ltv.churn-risk-discount.medium=0.15
crm.ltv.churn-risk-discount.high=0.35

# Scheduler — nightly at 2:00 AM
crm.analytics.cron=0 0 2 * * *

# Actuator — expose only /actuator/health (used by ALB health checks)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never